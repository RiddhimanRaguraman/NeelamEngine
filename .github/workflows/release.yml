name: release

# Every push to main triggers a release (when .github/actions.enabled is 'true').
# Also runnable manually from the Actions tab for testing the release path.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight run if a newer push lands on main.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Needed to create GitHub Releases.
permissions:
  contents: write

jobs:
  # Cheap Linux gate. Reads .github/actions.enabled and decides whether the
  # expensive Windows job should run. Costs ~5 seconds, billed at 1x.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions.enabled
          sparse-checkout-cone-mode: false
      - id: check
        run: |
          flag=$(tr -d '[:space:]' < .github/actions.enabled 2>/dev/null || echo "false")
          echo "Flag value: '$flag'"
          echo "enabled=$flag" >> "$GITHUB_OUTPUT"

  release:
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Step 1: premake generates the .sln.
      - name: Generate solution (premake5 vs2022)
        working-directory: Neelam
        run: .\Vendor\bin\premake\premake5.exe vs2022

      # Step 2: build the C++ engine DLL (and the editor's normal output).
      # We still need msbuild here because dotnet publish only knows the .csproj
      # side of the world; the engine is C++ and lives in a vcxproj.
      - name: Build solution (Release | x64)
        working-directory: Neelam
        run: msbuild Neelam.sln /restore /p:Configuration=Release /p:Platform=x64 /m /v:minimal /nologo

      # Step 3: publish the editor as ONE self-contained exe. Everything managed --
      # our code, WPF, the .NET 8 Desktop Runtime -- is bundled inside
      # NeelamEditor.exe, so the end user needs no .NET install and the release
      # root stays clean. The apphost requires hostfxr.dll + the .json configs to
      # sit directly beside it, so bundling is the only way to keep them out of
      # the root; a plain folder publish would scatter ~200 files there.
      # Trade: native runtime bits self-extract to %TEMP%\.net on the first launch
      # of each version, so first start is a second or two slower. Cached after.
      - name: Publish editor (single-file, self-contained, win-x64)
        working-directory: Neelam/NeelamEditor
        run: >
          dotnet publish NeelamEditor.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o ${{ github.workspace }}/publish

      # Step 4: copy EVERY native DLL into publish/Engine/.
      # NeelamEngine.dll imports Math, File and AnimTime (premake: links { ... }),
      # and the OS loader resolves those when the module loads -- so shipping only
      # the engine gave a DllNotFoundException on the first P/Invoke. Globbing the
      # premake targetdirs (bin/<cfg>/<project>/) picks up all of them, and any lib
      # added later, with no edit here. EngineAPI.Preload() points the loader at
      # this folder via SetDllDirectory.
      - name: Copy native DLLs into publish/Engine
        shell: pwsh
        run: |
          $dst = "${{ github.workspace }}/publish/Engine"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null

          $dlls = @(Get-ChildItem -Path "Neelam/bin/Release-windows-*/*/*.dll" -ErrorAction SilentlyContinue)
          if (-not ($dlls | Where-Object { $_.Name -eq 'NeelamEngine.dll' })) {
            Write-Host "::group::All .dll files under Neelam/ (diagnostic)"
            Get-ChildItem -Recurse -Filter *.dll -Path Neelam | Format-Table FullName, Length
            Write-Host "::endgroup::"
            Write-Error "NeelamEngine.dll not found under Neelam/bin/ -- did the C++ build succeed?"
            exit 1
          }

          $dlls | Copy-Item -Destination $dst
          Write-Host "Copied $($dlls.Count) native DLL(s) -> publish/Engine/:"
          $dlls | ForEach-Object { Write-Host "  $($_.Name)" }

      # Step 5: also copy the ProjectTemplates folder so the editor can find
      # its templates at runtime (the dev-time _templatePath uses ..\..\..\
      # which won't resolve once the editor is installed somewhere else).
      - name: Copy ProjectTemplates into publish folder
        shell: pwsh
        run: |
          $src = "Neelam/NeelamEditor/ProjectTemplates"
          $dst = "${{ github.workspace }}/publish/ProjectTemplates"
          if (Test-Path $src) {
            Copy-Item -Recurse $src $dst
            Write-Host "Copied ProjectTemplates -> publish/ProjectTemplates"
          } else {
            Write-Warning "ProjectTemplates folder not found at $src"
          }

      # Step 6: zip the publish folder. Version is read from .github/version —
      # bump that file to mark a new release. If the tag already exists on
      # GitHub the release step below will fail; that's the signal to bump.
      - name: Compute version + zip
        id: zip
        shell: pwsh
        run: |
          $version = (Get-Content .github/version -Raw).Trim()
          if (-not $version) {
            Write-Error ".github/version is missing or empty."
            exit 1
          }
          # Guard the shipped layout: exe alone in the root, DLLs under Engine\.
          # A stray .dll in the root means the single-file bundle leaked a
          # dependency and the packaging assumptions above no longer hold.
          $stray = Get-ChildItem -Path publish -Filter *.dll -File
          if ($stray) {
            Write-Error "Unexpected DLL(s) in publish root: $($stray.Name -join ', ')"
            exit 1
          }
          Write-Host "::group::Release layout"
          Get-ChildItem -Recurse publish | Select-Object FullName, Length | Format-Table
          Write-Host "::endgroup::"

          $zipName = "NeelamEditor-$version-win-x64.zip"
          Compress-Archive -Path publish/* -DestinationPath $zipName
          "zip_path=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Built $zipName (version: $version)"

      # Step 7: publish to the Releases page. Triggered on push to main; on
      # manual workflow_dispatch runs we still publish so you can grab the
      # release link directly.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.zip.outputs.version }}
          tag_name: ${{ steps.zip.outputs.version }}
          files: ${{ steps.zip.outputs.zip_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
