name: release

# Every push to main triggers a release (when .github/actions.enabled is 'true').
# Also runnable manually from the Actions tab for testing the release path.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight run if a newer push lands on main.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Needed to create GitHub Releases.
permissions:
  contents: write

jobs:
  # Cheap Linux gate. Reads .github/actions.enabled and decides whether the
  # expensive Windows job should run. Costs ~5 seconds, billed at 1x.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions.enabled
          sparse-checkout-cone-mode: false
      - id: check
        run: |
          flag=$(tr -d '[:space:]' < .github/actions.enabled 2>/dev/null || echo "false")
          echo "Flag value: '$flag'"
          echo "enabled=$flag" >> "$GITHUB_OUTPUT"

  release:
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Step 1: premake generates the .sln.
      - name: Generate solution (premake5 vs2022)
        working-directory: Neelam
        run: .\Vendor\bin\premake\premake5.exe vs2022

      # Step 2: build the C++ engine DLL (and the editor's normal output).
      # We still need msbuild here because dotnet publish only knows the .csproj
      # side of the world; the engine is C++ and lives in a vcxproj.
      - name: Build solution (Release | x64)
        working-directory: Neelam
        run: msbuild Neelam.sln /restore /p:Configuration=Release /p:Platform=x64 /m /v:minimal /nologo

      # Step 3: publish the editor as a self-contained, single-folder app.
      # This bundles the .NET 8 Desktop Runtime, so the end user does NOT need
      # to install anything before running NeelamEditor.exe.
      - name: Publish editor (self-contained, win-x64)
        working-directory: Neelam/NeelamEditor
        run: >
          dotnet publish NeelamEditor.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ${{ github.workspace }}/publish

      # Step 4: copy the freshly built engine DLL alongside the editor exe so
      # P/Invoke can find it at runtime.
      - name: Copy NeelamEngine.dll into publish folder
        shell: pwsh
        run: |
          $engineDll = Get-ChildItem -Recurse -Filter NeelamEngine.dll -Path Neelam |
            Where-Object { $_.FullName -match 'Release' } |
            Select-Object -First 1
          if (-not $engineDll) {
            Write-Host "::group::All .dll files under Neelam/ (diagnostic)"
            Get-ChildItem -Recurse -Filter *.dll -Path Neelam | Format-Table FullName, Length
            Write-Host "::endgroup::"
            Write-Error "NeelamEngine.dll not found anywhere under Neelam/"
            exit 1
          }
          Copy-Item $engineDll.FullName "${{ github.workspace }}/publish/"
          Write-Host "Copied $($engineDll.FullName) -> publish/"

      # Step 5: also copy the ProjectTemplates folder so the editor can find
      # its templates at runtime (the dev-time _templatePath uses ..\..\..\
      # which won't resolve once the editor is installed somewhere else).
      - name: Copy ProjectTemplates into publish folder
        shell: pwsh
        run: |
          $src = "Neelam/NeelamEditor/ProjectTemplates"
          $dst = "${{ github.workspace }}/publish/ProjectTemplates"
          if (Test-Path $src) {
            Copy-Item -Recurse $src $dst
            Write-Host "Copied ProjectTemplates -> publish/ProjectTemplates"
          } else {
            Write-Warning "ProjectTemplates folder not found at $src"
          }

      # Step 6: auto-generate a version from the date + short SHA. No git tag
      # required — each push to main gets its own release like
      # "v2026.06.18-abc1234".
      - name: Compute version + zip
        id: zip
        shell: pwsh
        run: |
          $date = Get-Date -Format 'yyyy.MM.dd'
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $version = "v$date-$shortSha"
          $zipName = "NeelamEditor-$version-win-x64.zip"
          Compress-Archive -Path publish/* -DestinationPath $zipName
          "zip_path=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Built $zipName"

      # Step 7: publish to the Releases page. Triggered on push to main; on
      # manual workflow_dispatch runs we still publish so you can grab the
      # release link directly.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NeelamEditor ${{ steps.zip.outputs.version }}
          tag_name: ${{ steps.zip.outputs.version }}
          files: ${{ steps.zip.outputs.zip_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
