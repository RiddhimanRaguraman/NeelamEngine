name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run for the same ref when a new push lands.
# Saves minutes on rapid push sequences (private repo billing).
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Generate solution (premake5 vs2022)
        working-directory: Neelam
        run: .\Vendor\bin\premake\premake5.exe vs2022

      - name: Build (Release | x64)
        working-directory: Neelam
        run: msbuild Neelam.sln /restore /p:Configuration=Release /p:Platform=x64 /m /v:minimal /nologo

      - name: Upload editor build
        uses: actions/upload-artifact@v4
        with:
          name: NeelamEditor-Release-x64
          path: |
            Neelam/bin/Release-windows-x64/
            Neelam/x64/
          if-no-files-found: warn
          retention-days: 7
